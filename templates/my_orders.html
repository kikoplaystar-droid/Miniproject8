<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>My Orders — Sushi‑Manga</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
</head>

<body>

    {% include '_navigation.html' %}

    <div class="orders-container">
        <h2>Your Orders</h2>

        {% if us_orders %}
        {% for order in us_orders %}
        <div class="order-card">
            <p class="order-title">Order #{{ order.id }}</p>
            <p class="order-date">Date: {{ order.get_time() }}</p>

            <a class="order-btn" href="/my_order/{{ order.id }}">
                View Details
            </a>
        </div>
        {% endfor %}
        {% else %}
        <h3 class="empty-orders">You have no orders yet</h3>
        {% endif %}
    </div>

</body>

</html>

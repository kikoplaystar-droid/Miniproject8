<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Menu Review — Admin Panel</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
</head>

<body>

    {% include '_navigation.html' %}

    <div class="admin-container">
        <h2>Menu Review</h2>

        <table class="admin-table">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Description</th>
                <th>Price (UAH)</th>
                <th>Active</th>
                <th>Actions</th>
            </tr>

            {% for pos in all_positions %}
            <tr>
                <td>{{ pos.id }}</td>
                <td>{{ pos.name }}</td>
                <td>{{ pos.description }}</td>
                <td>{{ pos.price }}</td>
                <td>{{ "Yes" if pos.active else "No" }}</td>

                <td>
                    <form method="post" class="admin-actions">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                        <input type="hidden" name="pos_id" value="{{ pos.id }}">

                        <button type="submit" name="change_status" class="btn-status">
                            Change Status
                        </button>

                        <button type="submit" name="delete_position" class="btn-delete">
                            Delete
                        </button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </table>
    </div>

</body>

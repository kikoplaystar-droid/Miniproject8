<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Main Menu — Sushi‑Manga</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
</head>

<body>

    {% include '_navigation.html' %}

    <div class="menu-container">
        <h2>Our Menu</h2>

        <div class="menu-grid">
            {% for position in all_positions %}
            <div class="menu-card">
                <img src="/static/menu/{{ position.file_name }}" alt="{{ position.name }}">

                <h3>{{ position.name }}</h3>

                <p class="ingredients">{{ position.ingredients }}</p>

                <a class="menu-btn" href="/position/{{ position.name }}">
                    View Details
                </a>
            </div>
            {% endfor %}
        </div>
    </div>

</body>

</html>

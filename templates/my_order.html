<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <title>Деталі замовлення</title>
<link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}"></head>

<body>
    {% include '_navigation.html' %}
    <h2>Ваше замовлення №{{ order.id }}</h2>
    <p>Перелік позицій:</p>
    <ul>
        {% for id, data in order.order_list.items() %}
        <li>{{ data['name'] }} — кількість: {{ data['count'] }}</li>
        {% endfor %}
    </ul>
    <p><strong>Дата та час:</strong> {{ order.get_time() }}</p>
    <p><strong>Загальна сума:</strong> {{ total_price }} грн</p>

    <form method="post" action="/cancel_order/{{ order.id }}">
        <button type="submit">Скасувати замовлення</button>
    </form>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Add New Item — Sushi‑Manga</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
</head>

<body>

    {% include '_navigation.html' %}

    <div class="form-container">
        <h2>Add New Menu Item</h2>

        <form method="post" enctype="multipart/form-data">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

            <input type="text" name="name" placeholder="Item Name" required>

            <input type="file" name="img" accept="image/*" required>

            <textarea name="ingredients" placeholder="Ingredients" required></textarea>

            <textarea name="description" placeholder="Description" required></textarea>

            <input type="number" name="price" placeholder="Price (UAH)" required>

            <input type="number" name="weight" placeholder="Weight (g)" required>

            <button type="submit">Add Item</button>
        </form>
    </div>

</body>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>{{ position.name }} — Sushi‑Manga</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
</head>

<body>

    {% include '_navigation.html' %}

    {% with messages = get_flashed_messages() %}
    {% if messages %}
    <div class="flash-messages">
        <div class="alert">{{ messages[-1] }}</div>
    </div>
    {% endif %}
    {% endwith %}

    <div class="position-container">

        <img class="position-img" src="/static/menu/{{ position.file_name }}" alt="{{ position.name }}">

        <h2 class="position-title">{{ position.name }} ({{ position.weight }} g)</h2>

        <p class="position-ingredients">{{ position.ingredients }}</p>

        <h3>Description:</h3>
        <pre class="position-description">{{ position.description }}</pre>

        <p class="position-price">{{ position.price }} UAH</p>

        <form method="post" class="position-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <input type="hidden" name="name" value="{{ position.name }}">

            <input type="number" name="num" placeholder="Quantity" min="1" required>

            <button type="submit" class="add-btn">Add to Cart</button>
        </form>

    </div>

</body>

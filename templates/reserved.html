<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Table Reservation — Sushi‑Manga</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
</head>

<body>

    {% include '_admin_navigation.html' %}

    <div class="form-container">
        <h2>Table Reservation</h2>

        <form method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

            <p>Select table type</p>
            <select name="table_type" class="select-input">
                <option value="1-2">1–2 people</option>
                <option value="3-4">3–4 people</option>
                <option value="4+">More than 4 people</option>
            </select>

            <input type="datetime-local" name="time" required>

            <button type="submit">Reserve</button>
        </form>

        {% if message %}
        <h3 class="reservation-message">{{ message }}</h3>
        {% endif %}
    </div>

</body>

</html>
